{% load static %}
{% comment %} <p>{{ request.user }}</p> {% endcomment %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WheelDeal Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/admin/adminhome.css' %}">
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">🛞</div>
    <div class="logo-text">Wheel<span>Deal</span></div>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-label">Main</div>
    <a class="nav-item active" onclick="navigate('dashboard', this)">
      <span class="icon">📊</span> Dashboard
    </a>
    <a class="nav-item" onclick="navigate('cars', this)">
      <span class="icon">🚙</span> Manage Cars
    </a>
    <a class="nav-item" onclick="navigate('users', this)">
      <span class="icon">👥</span> Users
      <span class="nav-badge">3</span>
    </a>
    <a class="nav-item" onclick="navigate('inquiries', this)">
      <span class="icon">💬</span> Inquiries
      <span class="nav-badge">7</span>
    </a>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-label">Reports</div>
    <a class="nav-item" onclick="navigate('analytics', this)">
      <span class="icon">📈</span> Analytics
    </a>
    <a class="nav-item" onclick="navigate('transactions', this)">
      <span class="icon">💰</span> Transactions
    </a>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-label">System</div>
    <a class="nav-item" onclick="navigate('settings', this)">
      <span class="icon">⚙️</span> Settings
    </a>
  </div>

  <div class="sidebar-footer">
    <div class="admin-avatar">
      <div class="avatar-img">AD</div>
      <div class="avatar-info">
        <div class="avatar-name">Admin User</div>
        <div class="avatar-role">Super Admin</div>
      </div>
      <span class="avatar-more">⋮</span>
    </div>
  </div>
</aside>


</body>
</html>
