<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
</head>

<body style="margin:0; padding:0; background:#f4f6f8; font-family:Arial, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6f8; padding:30px;">
<tr>
<td align="center">

<table width="600" cellpadding="0" cellspacing="0"
style="background:#ffffff; border-radius:10px; overflow:hidden;">

<!-- HEADER IMAGE -->
{% comment %} <tr>
<td align="center" style="background:#ffffff;">
    <img src="#" width="180" style="margin:20px 0;">
</td>
</tr> {% endcomment %}

<!-- TITLE -->
<tr>
<td align="center" style="padding:20px;">
    <h2 style="color:#111;">Welcome to <span style="color:#ff4d30;">WheelDeal</span> 🚗</h2>
</td>
</tr>

<!-- MESSAGE -->
<tr>
<td style="padding:0 40px 20px 40px; color:#555; font-size:16px; line-height:1.6;">
    Hello <strong><b>{{ first_name }}</b></strong>,
    <br><br>
    Thank you for joining <b>WheelDeal</b> — your smart platform
    to buy and sell cars easily.
    <br><br>
    We're excited to have you onboard!
</td>
</tr>

<!-- BUTTON -->
<tr>
<td align="center" style="padding:20px;">
    <a href="{{ login }}"
       style="
        background:#ff4d30;
        color:white;
        text-decoration:none;
        padding:14px 30px;
        border-radius:6px;
        font-weight:bold;
        display:inline-block;">
        Login to Your Account
    </a>
</td>
</tr>

<!-- FOOTER -->
<tr>
<td align="center"
style="padding:20px; font-size:12px; color:#999;">
© 2026 WheelDeal • All Rights Reserved
</td>
</tr>

</table>

</td>
</tr>
</table>

</body>
</html>
